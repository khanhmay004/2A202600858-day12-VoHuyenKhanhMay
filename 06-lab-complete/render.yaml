services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: free
    # Render injects $PORT; Dockerfile CMD hardcodes 8000, so override it here.
    # --workers 1 → in-memory rate-limit/cost-guard stay consistent (and fits free tier).
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_BUDGET_USD
        value: "5.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"
